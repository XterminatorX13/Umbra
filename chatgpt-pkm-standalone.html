<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PKM ChatGPT 2.0 — Dark Aurora</title>

<style>
/* ----------------------------------------------------------
   VARIÁVEIS DE TEMA — DARK AURORA
---------------------------------------------------------- */
:root {
  --bg-main: #000000;
  --bg-deep: #0A010D;
  --bg-panel: #0C0210;
  --bg-panel-2: #110015;

  --color-text-primary: #E5E5E5;
  --color-text-secondary: #A0A0A0;

  --highlight: #D96FFF;        /* highlight Google-style */
  --accent-1: #3B0E4F;         /* roxo profundo */
  --accent-2: #4F1366;         /* roxo neon discreto */

  /* Cores de fundo sutil */
  --layer-1: #0A0A0A;
  --layer-2: #141414;
  --layer-3: #1F1F1F;

  --border: #2A2A2A;
  --border-light: #3A3A3A;

  --radius: 8px;
  --radius-small: 5px;

  --sidebar-width: 300px;
  --gallery-gap: 14px;
}

/* ---------------------------------------------
   RESET E BASE
--------------------------------------------- */
* {
  box-sizing: border-box;
  scrollbar-width: thin;
  scrollbar-color: var(--accent-2) var(--bg-main);
}

body {
  margin: 0;
  padding: 0;
  background: var(--bg-main);
  color: var(--color-text-primary);
  font-family: "Inter", system-ui, sans-serif;
  overflow: hidden;
}

a {
  color: var(--highlight);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* ---------------------------------------------
   LAYOUT PRINCIPAL
--------------------------------------------- */
.app {
  display: grid;
  /* 3 colunas: sidebar | lista/galeria/busca | chat lateral */
  grid-template-columns: var(--sidebar-width) minmax(360px, 1.2fr) minmax(520px, 1.6fr);
  height: 100vh;
  width: 100vw;
  background: var(--bg-main);
}

/* Quando estiver em modo galeria, some com o chat e deixa a coluna central ocupar tudo */
.app.gallery-full {
  grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
}

.app.gallery-full .chat-container {
  display: none;
}

/* ---------------------------------------------
   SIDEBAR — estilo Notion-like
--------------------------------------------- */
.sidebar {
  background: var(--bg-deep);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-top: 8px;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  color: var(--highlight);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.new-folder-btn {
  background: var(--layer-2);
  border: 1px solid var(--border-light);
  border-radius: 999px;
  font-size: 11px;
  padding: 4px 10px;
  color: var(--color-text-secondary);
  cursor: pointer;
}
.new-folder-btn:hover {
  background: var(--accent-1);
  color: #fff;
}

/* Lista de seções da sidebar */
.sidebar-sections {
  flex: 1;
  overflow-y: auto;
  padding-right: 4px;
}

.section {
  margin-bottom: 10px;
}

.section-title {
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  cursor: pointer;
  user-select: none;
}

.section-content {
  padding-left: 10px;
  display: none;
}

.section-content.open {
  display: block;
}

/* Pastas (badges retangulares) */
.folder-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  margin: 4px 8px;
  cursor: pointer;
  background: var(--layer-2);
  border-radius: var(--radius-small);
  border: 1px solid var(--border-light);
  transition: background .15s;
}

.folder-item:hover {
  background: var(--layer-3);
}

.folder-color {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  background: var(--accent-2);
}

.folder-name {
  font-size: 13px;
  color: var(--color-text-primary);
}

.folder-icon {
  font-size: 15px;
}

/* ---------------------------------------------
   TOPO - Barra de ações
--------------------------------------------- */
.topbar {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.topbar input[type="file"] {
  color: var(--color-text-secondary);
  font-size: 12px;
}

.search-box {
  flex: 1;
}

.search-input {
  width: 100%;
  padding: 7px 10px;
  font-size: 13px;
  border-radius: var(--radius);
  border: 1px solid var(--border-light);
  background: var(--layer-1);
  color: var(--color-text-primary);
}

.view-switch {
  display: flex;
  gap: 8px;
}

.view-btn {
  background: var(--layer-2);
  border: 1px solid var(--border-light);
  color: var(--color-text-secondary);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-small);
  cursor: pointer;
}
.view-btn.active {
  background: var(--accent-1);
  color: #fff;
}

/* ---------------------------------------------
   ÁREA CENTRAL: LISTA / GALERIA / BUSCA
--------------------------------------------- */
.main-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* container com scroll independente */
.main-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.view-area {
  width: 100%;
}

/* LISTA DE CONVERSAS */
.conv-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.conv-item {
  padding: 12px 16px;
  background: var(--layer-1);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}

.conv-item:hover {
  background: var(--layer-2);
}

.conv-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}

.conv-meta {
  font-size: 11px;
  color: var(--color-text-secondary);
}

/* Visual tags simples */
.conv-tags {
  margin-top: 6px;
  font-size: 11px;
  color: var(--highlight);
}

/* ---------------------------------------------
   GALERIA (4 COLUNAS)
--------------------------------------------- */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--gallery-gap);
}

.gallery-card {
  background: var(--layer-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: background .15s, transform .1s;
}

.gallery-card:hover {
  background: var(--layer-2);
  transform: translateY(-2px);
}

.gallery-icon {
  font-size: 22px;
}

.gallery-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.gallery-preview {
  font-size: 11px;
  color: var(--color-text-secondary);
  line-height: 1.4;
  max-height: 36px;
  overflow: hidden;
}

/* ---------------------------------------------
   RESULTADO DE BUSCA (GOOGLE STYLE)
--------------------------------------------- */
.search-results {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.search-result-item {
  padding: 12px;
  background: var(--layer-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.search-result-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--highlight);
}

.search-result-snippet {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 4px;
}

.search-highlight {
  color: var(--highlight);
  font-weight: 700;
}

/* ----------------------------------------------------------
   CHAT VIEWER + MODAL SUPERPOWER
---------------------------------------------------------- */
.chat-container {
  position: relative;
  background: var(--bg-deep);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
}

.chat-actions {
  display: flex;
  gap: 10px;
}

.btn-fav,
.btn-open-modal {
  font-size: 18px;
  cursor: pointer;
  color: var(--color-text-secondary);
}
.btn-fav.active {
  color: var(--highlight);
}

.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* BOLHAS */
.msg {
  max-width: 80%;
  margin-bottom: 14px;
  padding: 12px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.msg-user {
  margin-left: auto;
  background: var(--layer-2);
  border: 1px solid var(--border-light);
}

.msg-assistant {
  margin-right: auto;
  background: var(--layer-1);
  border: 1px solid var(--border-light);
}

.msg-system {
  margin: 0 auto;
  background: transparent;
  color: var(--color-text-secondary);
  font-size: 11px;
  text-align: center;
}

/* timestamp */
.msg-time {
  font-size: 10px;
  margin-top: 6px;
  color: var(--color-text-secondary);
  opacity: 0.7;
}

/* ----------------------------------------------------------
   MODAL SUPERPOWER VIEWER
---------------------------------------------------------- */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 24px;
  z-index: 99;
}

.modal-bg.active {
  display: flex;
}

.modal {
  width: 90%;
  max-width: 1200px;
  height: 90%;
  max-height: 820px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modal-in .15s ease;
}

@keyframes modal-in {
  from { opacity: 0; transform: scale(0.92);}
  to { opacity: 1; transform: scale(1);}
}

.modal-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  font-size: 18px;
  cursor: pointer;
}

.modal-scroll {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* ----------------------------------------------------------
   NOTAS PRIVADAS (abaixo do chat)
---------------------------------------------------------- */
.notes-panel {
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 12px 16px;
}

.notes-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
}

.notes-input {
  width: 100%;
  padding: 10px;
  font-size: 13px;
  border-radius: var(--radius);
  background: var(--layer-1);
  border: 1px solid var(--border-light);
  color: var(--color-text-primary);
  min-height: 80px;
  resize: vertical;
}
</style>
</head>

<body>

<div class="app">

  <!-- ====================== SIDEBAR ====================== -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Pastas & Categorias</span>
      <button id="btn-new-folder" class="new-folder-btn">+ Pasta</button>
    </div>

    <div id="folder-sections" class="sidebar-sections"></div>
  </div>

  <!-- ====================== ÁREA CENTRAL ====================== -->
  <div class="main-area">

    <!-- TOPBAR -->
    <div class="topbar">
      <input type="file" id="file-input" multiple>

      <div class="search-box">
        <input id="search-input" class="search-input" type="text"
               placeholder="Buscar por termos, trechos ou títulos...">
      </div>

      <div class="view-switch">
        <button class="view-btn active" data-view="list">Lista</button>
        <button class="view-btn" data-view="gallery">Galeria</button>
        <button class="view-btn" data-view="search">Busca</button>
      </div>
    </div>

    <!-- ÁREA QUE MUDA: LISTA / GALERIA / BUSCA -->
    <div class="main-scroll">
      <div id="list-view" class="view-area"></div>
      <div id="gallery-view" class="view-area" style="display:none;"></div>
      <div id="search-view" class="view-area" style="display:none;"></div>
    </div>

  </div>

  <!-- ====================== CHAT VIEWER ====================== -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-title" id="chat-title">Nenhuma conversa</div>
      <div class="chat-actions">
        <div class="btn-fav" id="btn-fav">☆</div>
        <div class="btn-open-modal" id="btn-modal">⤢</div>
      </div>
    </div>

    <div class="chat-scroll" id="chat-scroll"></div>

    <div class="notes-panel">
      <div class="notes-title">Notas (privadas)</div>
      <textarea id="notes-input" class="notes-input"
                placeholder="Adicione reflexões, insights, resumos..."></textarea>
    </div>
  </div>
</div>

<!-- ====================== MODAL SUPERPOWER ====================== -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title"></span>
      <span class="modal-close" id="modal-close">✕</span>
    </div>
    <div class="modal-scroll" id="modal-scroll"></div>
  </div>
</div>

<!-- ====================== JAVASCRIPT ====================== -->
<script>
console.log("PKM 2.0 — Dark Aurora Loaded");

/* ---------- Metadata no localStorage ---------- */
const META_KEY = "pkm_metadata_v2";
let metadata = JSON.parse(localStorage.getItem(META_KEY) || "{}");

function saveMeta() {
  localStorage.setItem(META_KEY, JSON.stringify(metadata));
}

/* ---------- Conversas carregadas ---------- */
let conversations = [];
let activeConvKey = null;

/* ---------- Renderização Geral ---------- */
const listView = document.getElementById("list-view");
const galleryView = document.getElementById("gallery-view");
const searchView = document.getElementById("search-view");
const searchInput = document.getElementById("search-input");

/* ---------- Chat Viewer ---------- */
const chatScroll = document.getElementById("chat-scroll");
const chatTitleEl = document.getElementById("chat-title");
const notesEl = document.getElementById("notes-input");
const btnFav = document.getElementById("btn-fav");

/* ---------- Modal ---------- */
const modalBG   = document.getElementById("modal-bg");
const modalTitle  = document.getElementById("modal-title");
const modalScroll = document.getElementById("modal-scroll");
const btnModal  = document.getElementById("btn-modal");
const modalClose = document.getElementById("modal-close");

/* ---------- Sidebar elements ---------- */
const folderSectionsEl = document.getElementById("folder-sections");
const fileInput        = document.getElementById("file-input");
const btnNewFolder     = document.getElementById("btn-new-folder");

/* ==========================================================
   UTILS — Funções Gerais
========================================================== */
function epochToString(epoch) {
  if (!epoch) return "";
  const ms = epoch < 2000000000 ? epoch * 1000 : epoch;
  const d = new Date(ms);
  return d.toLocaleString();
}

function sanitize(text) {
  return text.replace(/[<>]/g, "");
}

/* Gera um ID estável para cada conversa */
function getConvKey(conv) {
  if (conv.raw && conv.raw.id) return conv.raw.id;
  return (conv.title || "") + "::" + (conv.createTime || "");
}

/* ---------- Folder metadata (cores / ícones) ---------- */
const FOLDER_META_KEY = "pkm_folder_meta_v1";
let folderMeta = JSON.parse(localStorage.getItem(FOLDER_META_KEY) || "{}");

function saveFolderMeta() {
  localStorage.setItem(FOLDER_META_KEY, JSON.stringify(folderMeta));
}

function randomFolderColor() {
  const palette = [
    "#4F1366",
    "#3B0E4F",
    "#5E1A72",
    "#7A1E8A",
    "#9D3BB0"
  ];
  return palette[Math.floor(Math.random() * palette.length)];
}

function getFolderMeta(name) {
  if (!folderMeta[name]) {
    folderMeta[name] = {
      icon: "📁",
      color: randomFolderColor()
    };
    saveFolderMeta();
  }
  return folderMeta[name];
}

function createNewFolder() {
  const name = prompt("Nome da nova pasta:", "");
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed) return;

  const icon = prompt(`Ícone para "${trimmed}" (emoji ou texto):`, "📁") || "📁";
  const color = prompt(
    `Cor em hex para "${trimmed}" (ex.: #4F1366):`,
    randomFolderColor()
  ) || randomFolderColor();

  folderMeta[trimmed] = { icon, color };
  saveFolderMeta();
  renderSidebar();
}

if (btnNewFolder) {
  btnNewFolder.addEventListener("click", createNewFolder);
}

/* ---------- Estado de pasta e view ---------- */
let activeFolder = "__ALL__"; // __ALL__, __FAV__ ou nome da pasta
let currentView  = "list";

/* ==========================================================
   EXTRAÇÃO DE MENSAGENS DO JSON DO CHATGPT
========================================================== */
function extractMessagesFromMapping(mapping, fallbackTime) {
  const msgs = [];
  for (const key in mapping) {
    const node = mapping[key];
    if (!node || !node.message) continue;

    const msg    = node.message;
    const author = msg.author || {};
    const role   = author.role || "unknown";

    if (role === "tool") continue;
    if (msg.metadata && msg.metadata.is_visually_hidden_from_conversation) continue;

    const contentObj = msg.content || {};
    const ctype = contentObj.content_type;

    if (ctype && String(ctype).startsWith("tether_")) continue;

    let text = "";

    if (ctype === "text" && Array.isArray(contentObj.parts)) {
      text = contentObj.parts.join("\n\n");
    } else if (ctype === "user_editable_context") {
      continue;
    } else {
      continue;
    }

    if (!text.trim()) continue;

    const ts = msg.create_time != null ? msg.create_time : (fallbackTime || 0);

    msgs.push({
      id: msg.id || key,
      role,
      textPlain: text,
      textMarkdown: text,
      timestamp: ts
    });
  }

  msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  return msgs;
}

function normalizeConversation(raw) {
  const title      = raw.title || "(Sem título)";
  const createTime = raw.create_time || null;
  const updateTime = raw.update_time || null;
  const mapping    = raw.mapping || {};
  const messages   = extractMessagesFromMapping(mapping, createTime);
  const firstText  = messages.length ? messages[0].textPlain : "";
  const preview    = firstText.slice(0, 160).replace(/\s+/g, " ");

  return {
    raw,
    title,
    createTime,
    updateTime,
    messages,
    preview
  };
}

/* ==========================================================
   SIDEBAR — Pastas, Seções, Ícones & Cores
========================================================== */
function editFolderSettings(name) {
  const current = getFolderMeta(name);
  const icon = prompt(
    `Ícone para a pasta "${name}" (emoji ou texto):`,
    current.icon || "📁"
  );
  if (icon === null) return;
  const color = prompt(
    `Cor em hex para a pasta "${name}" (ex.: #4F1366):`,
    current.color || "#4F1366"
  );
  if (color === null) return;
  folderMeta[name] = { icon, color };
  saveFolderMeta();
  renderSidebar();
  renderListView();
  renderGalleryView();
}

function createSection(label, open) {
  const sec = document.createElement("div");
  sec.className = "section";

  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = label;

  const content = document.createElement("div");
  content.className = "section-content";
  if (open) content.classList.add("open");

  title.addEventListener("click", () => {
    content.classList.toggle("open");
  });

  sec.appendChild(title);
  sec.appendChild(content);
  return sec;
}

function createFolderItem(folderId, icon, label, color) {
  const div = document.createElement("div");
  div.className = "folder-item";

  const colorBox = document.createElement("div");
  colorBox.className = "folder-color";
  if (color) colorBox.style.backgroundColor = color;

  const iconSpan = document.createElement("span");
  iconSpan.className = "folder-icon";
  iconSpan.textContent = icon;

  const nameSpan = document.createElement("span");
  nameSpan.className = "folder-name";
  nameSpan.textContent = label;

  div.appendChild(colorBox);
  div.appendChild(iconSpan);
  div.appendChild(nameSpan);

  div.addEventListener("click", () => {
    setActiveFolder(folderId);
  });

  if (folderId !== "__ALL__" && folderId !== "__FAV__") {
    div.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      editFolderSettings(folderId);
    });
  }

  return div;
}

function renderSidebar() {
  folderSectionsEl.innerHTML = "";

  // Seção GERAL
  const secGeral = createSection("GERAL", true);
  const contG = secGeral.querySelector(".section-content");
  contG.appendChild(createFolderItem("__ALL__", "📚", "Todas as conversas"));
  contG.appendChild(createFolderItem("__FAV__", "⭐", "Favoritos"));
  folderSectionsEl.appendChild(secGeral);

  // Seção PASTAS (tanto as definidas quanto as usadas em conversas)
  const foldersSet = new Set(Object.keys(folderMeta || {}));

  conversations.forEach(conv => {
    const key  = getConvKey(conv);
    const meta = metadata[key] || {};
    if (meta.deleted) return;
    if (meta.folder) foldersSet.add(meta.folder);
  });

  if (foldersSet.size > 0) {
    const secPastas = createSection("PASTAS", true);
    const contP = secPastas.querySelector(".section-content");

    Array.from(foldersSet).sort().forEach(name => {
      const fm = getFolderMeta(name);
      contP.appendChild(
        createFolderItem(name, fm.icon || "📁", name, fm.color)
      );
    });

    folderSectionsEl.appendChild(secPastas);
  }
}

function setActiveFolder(folderId) {
  activeFolder = folderId;
  renderListView();
  renderGalleryView();
}

/* Context menu para mover conversa de pasta */
function attachFolderContextMenu(element, convKey) {
  element.addEventListener("contextmenu", (e) => {
    e.preventDefault();

    const current  = (metadata[convKey] || {}).folder || "";
    const existing = Object.keys(folderMeta || {});
    let msg = "Nome da pasta para esta conversa.\n";
    if (existing.length) {
      msg += "Pastas existentes: " + existing.join(", ") + "\n";
    }
    msg += "Deixe vazio para remover da pasta.";

    const name = prompt(msg, current);
    if (name === null) return;

    const trimmed = name.trim();
    if (!metadata[convKey]) metadata[convKey] = {};

    if (!trimmed) {
      delete metadata[convKey].folder;
    } else {
      metadata[convKey].folder = trimmed;
      getFolderMeta(trimmed); // garante que a pasta exista
    }

    saveMeta();
    renderSidebar();
    renderListView();
    renderGalleryView();
  });
}

/* ==========================================================
   FILTRO PRINCIPAL DE CONVERSAS
========================================================== */
function getFilteredConversations() {
  return conversations.filter(conv => {
    const key  = getConvKey(conv);
    const meta = metadata[key] || {};
    if (meta.deleted) return false;

    if (activeFolder === "__ALL__") return true;
    if (activeFolder === "__FAV__")  return !!meta.favorite;

    return meta.folder === activeFolder;
  });
}

/* ==========================================================
   RENDERIZAÇÃO: LISTA & GALERIA
========================================================== */
function renderListView() {
  listView.innerHTML = "";
  const convs = getFilteredConversations();
  if (!convs.length) {
    listView.innerHTML = '<div class="conv-meta">Nenhuma conversa nesta pasta.</div>';
    return;
  }

  const container = document.createElement("div");
  container.className = "conv-list";

  convs.forEach(conv => {
    const key  = getConvKey(conv);
    const meta = metadata[key] || {};

    const item = document.createElement("div");
    item.className = "conv-item";

    const title = document.createElement("div");
    title.className = "conv-title";
    title.textContent = conv.title || "(Sem título)";

    const metaDiv = document.createElement("div");
    metaDiv.className = "conv-meta";
    const parts = [];
    if (conv.createTime) parts.push(epochToString(conv.createTime));
    if (meta.folder)      parts.push(meta.folder);
    if (meta.favorite)    parts.push("★ Favorito");
    metaDiv.textContent = parts.join(" · ");

    const tagsDiv = document.createElement("div");
    tagsDiv.className = "conv-tags";
    if (meta.tags && meta.tags.length) {
      tagsDiv.textContent = meta.tags.map(t => "#" + t).join(" ");
    }

    item.appendChild(title);
    item.appendChild(metaDiv);
    item.appendChild(tagsDiv);

    item.addEventListener("click", () => {
      setActiveConversation(key);
    });
    attachFolderContextMenu(item, key);

    container.appendChild(item);
  });

  listView.appendChild(container);
}

function renderGalleryView() {
  galleryView.innerHTML = "";
  const convs = getFilteredConversations();
  if (!convs.length) {
    galleryView.innerHTML = '<div class="conv-meta">Nenhuma conversa nesta pasta.</div>';
    return;
  }

  const grid = document.createElement("div");
  grid.className = "gallery-grid";

  convs.forEach(conv => {
    const key  = getConvKey(conv);
    const meta = metadata[key] || {};
    const folderName = meta.folder || null;
    let icon  = "💬";
    let color = "#2A2A2A";

    if (folderName) {
      const fm = getFolderMeta(folderName);
      icon  = fm.icon  || "📁";
      color = fm.color || color;
    }

    const card = document.createElement("div");
    card.className = "gallery-card";

    const iconRow = document.createElement("div");
    iconRow.style.display = "flex";
    iconRow.style.alignItems = "center";
    iconRow.style.gap = "8px";

    const iconEl = document.createElement("div");
    iconEl.className = "gallery-icon";
    iconEl.textContent = icon;

    const badge = document.createElement("div");
    badge.style.fontSize       = "10px";
    badge.style.padding        = "2px 6px";
    badge.style.borderRadius   = "999px";
    badge.style.backgroundColor = color;
    badge.style.color          = "#fff";
    badge.textContent          = folderName || "Sem pasta";

    iconRow.appendChild(iconEl);
    iconRow.appendChild(badge);

    const title = document.createElement("div");
    title.className = "gallery-title";
    title.textContent = conv.title || "(Sem título)";

    const preview = document.createElement("div");
    preview.className = "gallery-preview";
    preview.textContent = conv.preview || "";

    card.appendChild(iconRow);
    card.appendChild(title);
    card.appendChild(preview);

    card.addEventListener("click", () => {
      openConversationInModal(key);
    });
    attachFolderContextMenu(card, key);

    grid.appendChild(card);
  });

  galleryView.appendChild(grid);
}

/* ==========================================================
   CHAT VIEWER
========================================================== */
function renderMarkdown(text) {
  let html = sanitize(text);

  // inline code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  // bold
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  // italics
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  // links
  html = html.replace(/https?:\/\/[^\s]+/g, (m) => `<a href="${m}" target="_blank">${m}</a>`);

  const parts = html.split(/\n{2,}/).map(p => p.replace(/\n/g, "<br>"));
  return parts.map(p => `<p>${p}</p>`).join("");
}

function renderMessagesInto(conv, container) {
  container.innerHTML = "";
  conv.messages.forEach(m => {
    const div = document.createElement("div");
    let cls = "msg ";

    if (m.role === "user")       cls += "msg-user";
    else if (m.role === "assistant") cls += "msg-assistant";
    else                         cls += "msg-system";

    div.className = cls;

    if (m.role === "system") {
      div.textContent = m.textPlain;
    } else {
      const contentDiv = document.createElement("div");
      contentDiv.innerHTML = renderMarkdown(m.textMarkdown || m.textPlain);
      div.appendChild(contentDiv);

      if (m.timestamp) {
        const timeDiv = document.createElement("div");
        timeDiv.className = "msg-time";
        timeDiv.textContent = epochToString(m.timestamp);
        div.appendChild(timeDiv);
      }
    }

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

function setActiveConversation(convKey) {
  activeConvKey = convKey;
  const conv = conversations.find(c => getConvKey(c) === convKey);
  if (!conv) return;

  chatTitleEl.textContent = conv.title || "(Sem título)";
  renderMessagesInto(conv, chatScroll);
  syncNotesForActive();
  syncFavButton();
}

function syncNotesForActive() {
  if (!activeConvKey) {
    notesEl.value = "";
    return;
  }
  const meta = metadata[activeConvKey] || {};
  notesEl.value = meta.notes || "";
}

function syncFavButton() {
  if (!activeConvKey) {
    btnFav.textContent = "☆";
    btnFav.classList.remove("active");
    return;
  }
  const meta = metadata[activeConvKey] || {};
  const fav  = !!meta.favorite;
  btnFav.textContent = fav ? "★" : "☆";
  if (fav) btnFav.classList.add("active");
  else     btnFav.classList.remove("active");
}

/* ==========================================================
   MODAL SUPERPOWER
========================================================== */
function openConversationInModal(convKey) {
  const conv = conversations.find(c => getConvKey(c) === convKey);
  if (!conv) return;

  activeConvKey = convKey;
  chatTitleEl.textContent = conv.title || "(Sem título)";
  renderMessagesInto(conv, chatScroll);
  syncNotesForActive();
  syncFavButton();

  modalTitle.textContent = conv.title || "(Sem título)";
  renderMessagesInto(conv, modalScroll);
  modalBG.classList.add("active");
}

modalClose.addEventListener("click", () => {
  modalBG.classList.remove("active");
});

modalBG.addEventListener("click", (e) => {
  if (e.target === modalBG) {
    modalBG.classList.remove("active");
  }
});

btnModal.addEventListener("click", () => {
  if (!activeConvKey) return;
  openConversationInModal(activeConvKey);
});

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    modalBG.classList.remove("active");
  }
});

/* ==========================================================
   NOTAS & FAVORITOS
========================================================== */
notesEl.addEventListener("blur", () => {
  if (!activeConvKey) return;
  if (!metadata[activeConvKey]) metadata[activeConvKey] = {};
  metadata[activeConvKey].notes = notesEl.value;
  saveMeta();
});

btnFav.addEventListener("click", () => {
  if (!activeConvKey) return;
  if (!metadata[activeConvKey]) metadata[activeConvKey] = {};
  metadata[activeConvKey].favorite = !metadata[activeConvKey].favorite;
  saveMeta();
  syncFavButton();
  renderListView();
  renderGalleryView();
});

/* ==========================================================
   BUSCA – estilo Google com snippets e highlight
========================================================== */
let searchIndex = [];

function buildSearchIndex() {
  searchIndex = [];
  conversations.forEach(conv => {
    const convKey = getConvKey(conv);
    conv.messages.forEach(m => {
      if (!m.textPlain) return;
      searchIndex.push({
        convKey,
        convTitle: conv.title || "(Sem título)",
        role: m.role,
        text: m.textPlain,
        timestamp: m.timestamp
      });
    });
  });
}

function escapeRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function makeHighlightedSnippet(text, query) {
  const lower = text.toLowerCase();
  const idx = lower.indexOf(query.toLowerCase());
  if (idx === -1) {
    return sanitize(text.slice(0, 160)) + (text.length > 160 ? "…" : "");
  }
  const start = Math.max(0, idx - 40);
  const end   = Math.min(text.length, idx + query.length + 40);
  let snippet = (start > 0 ? "…" : "") +
                text.slice(start, end) +
                (end < text.length ? "…" : "");
  let safe = sanitize(snippet);
  const rx = new RegExp("(" + escapeRegExp(query) + ")", "ig");
  safe = safe.replace(rx, '<span class="search-highlight">$1</span>');
  return safe;
}

function renderSearchView() {
  searchView.innerHTML = "";
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    searchView.innerHTML =
      '<div class="search-results"><div class="search-result-item">Digite um termo de busca acima para ver resultados.</div></div>';
    return;
  }

  const results = searchIndex.filter(doc =>
    doc.text.toLowerCase().includes(q)
  );
  if (!results.length) {
    searchView.innerHTML =
      '<div class="search-results"><div class="search-result-item">Nenhum resultado encontrado.</div></div>';
    return;
  }

  const container = document.createElement("div");
  container.className = "search-results";

  results.slice(0, 300).forEach(doc => {
    const item = document.createElement("div");
    item.className = "search-result-item";

    const title = document.createElement("div");
    title.className = "search-result-title";
    title.textContent = doc.convTitle;

    const metaLine = document.createElement("div");
    metaLine.style.fontSize = "11px";
    metaLine.style.color   = "var(--color-text-secondary)";
    metaLine.textContent   =
      `${doc.role} · ${epochToString(doc.timestamp)}`;

    const snippetDiv = document.createElement("div");
    snippetDiv.className = "search-result-snippet";
    snippetDiv.innerHTML = makeHighlightedSnippet(doc.text, q);

    item.appendChild(title);
    item.appendChild(metaLine);
    item.appendChild(snippetDiv);

    item.addEventListener("click", () => {
      openConversationInModal(doc.convKey);
    });

    container.appendChild(item);
  });

  searchView.appendChild(container);
}

/* ==========================================================
   MUDANÇA DE VIEW (lista / galeria / busca)
========================================================== */
const viewButtons = document.querySelectorAll(".view-btn");
const appEl = document.querySelector(".app"); // <--- pega o container principal

viewButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const v = btn.dataset.view;
    currentView = v;

    viewButtons.forEach(b => b.classList.toggle("active", b === btn));
    listView.style.display   = (v === "list")    ? "block" : "none";
    galleryView.style.display = (v === "gallery") ? "block" : "none";
    searchView.style.display = (v === "search")  ? "block" : "none";

    // 🔁 comportamento novo:
    if (v === "gallery") {
      appEl.classList.add("gallery-full");   // some com chat, galeria ocupa tudo
    } else {
      appEl.classList.remove("gallery-full"); // volta o chat normalmente
    }

    if (v === "list")      renderListView();
    else if (v === "gallery") renderGalleryView();
    else if (v === "search")  renderSearchView();
  });
}); // <--- ESTA linha que faltava

/* ==========================================================
   CARREGAR ARQUIVOS JSON
========================================================== */
fileInput.addEventListener("change", (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;

  let remaining = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const data = JSON.parse(text);
        const arr = Array.isArray(data) ? data : (data.conversations || []);

        arr.forEach(raw => {
          const norm = normalizeConversation(raw);
          conversations.push(norm);
        });
      } catch (err) {
        console.error("Erro ao ler JSON:", err);
      } finally {
        remaining--;
        if (remaining === 0) {
          onAllFilesLoaded();
        }
      }
    };
    reader.readAsText(file, "utf-8");
  });
});

function onAllFilesLoaded() {
  renderSidebar();
  buildSearchIndex();
  renderListView();
  renderGalleryView();
  if (!activeConvKey && conversations.length) {
    setActiveConversation(getConvKey(conversations[0]));
  }
}
