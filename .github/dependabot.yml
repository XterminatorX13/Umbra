version: 2
updates:
  - package-ecosystem: "npm" # Verifica dependências do package.json
    directory: "/"           # Raiz do repositório
    schedule:
      interval: "weekly"     # Frequência das checagens (daily, weekly, monthly)
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
  - package-ecosystem: "github-actions" # Verifica actions em workflows (.github/workflows)
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "actions"
