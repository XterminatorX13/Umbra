name: Bug Report
description: Reporte um bug para nos ajudar a melhorar o PKM ChatGPT
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por nos ajudar a melhorar o app! Por favor, preencha o formulário abaixo da forma mais clara possível.
  - type: textarea
    id: description
    attributes:
      label: Descrição do Bug
      description: Uma descrição clara e concisa sobre o que é o bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Passos para Reproduzir
      description: Como podemos reproduzir este erro?
      placeholder: |
        1. Vá para '...'
        2. Clique em '....'
        3. Veja o erro
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Sistema Operacional
      description: Qual sistema operacional você está usando?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versão do App
      description: Exemplo: 2.0.0
      placeholder: "2.0.0"
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Tipo de Instalação
      options:
        - Instalador (.exe)
        - Portable
        - Rodando do código fonte (npm run dev)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto Adicional / Screenshots
      description: Adicione qualquer outro contexto sobre o problema aqui. Você pode arrastar imagens para esta caixa.
    validations:
      required: false
