<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT PKM 2.0 — Dark Aurora</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#D96FFF">
    <meta name="description" content="Sistema de gerenciamento pessoal de conhecimento para ChatGPT">
    <link rel="manifest" href="manifest.json">

    <!-- Adiciona botão "Instalar App" -->
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostra botão de instalar
            const installBtn = document.getElementById('install-btn');
            if (installBtn) {
                ''               installBtn.style.display = 'inline-block';
                installBtn.addEventListener('click', () => {
                    installBtn.style.display = 'none';
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('✅ App instalado!');
                        }
                        deferredPrompt = null;
                    });
                });
            }
        });
    </script>

    <style>
        /* Seu CSS existente... */
        #install-btn {
            display: none;
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            background: var(--highlight, #D96FFF);
            color: #000;
            border: none;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(217, 111, 255, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        #install-btn:hover {
            background: #ff6ec7;
        }
    </style>
